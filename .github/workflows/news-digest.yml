name: News Digest — IT & AI 资讯定时推送

on:
  schedule:
    # 每3小时执行一次（UTC时间）
    # 对应北京时间: 8:00, 11:00, 14:00, 17:00, 20:00, 23:00, 2:00, 5:00
    - cron: "0 */3 * * *"
  # 支持手动触发（方便测试）
  workflow_dispatch:

jobs:
  fetch-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行新闻抓取 & 邮件发送
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python main.py

      - name: 提交缓存更新
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .sent_cache.json
          git diff --staged --quiet || (git commit -m "📝 更新发送缓存 [skip ci]" && git push)
        continue-on-error: true
